name: Update Index

on:
  push:
    branches:
      - main

jobs:
  update-index:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install creeper CLI
        run: cargo install creeper@1.0.0-alpha.6

      - name: Build index
        run: creeper build-index ./package --output ./.index/index

      - name: Compress index
        working-directory: ./.index
        run: tar --zstd -cvf ./index.tar.zst ./index

      - name: Upload compressed index
        uses: actions/upload-artifact@v7
        with:
          name: index.tar.zst
          path: ./.index/index.tar.zst
          archive: false

      - name: Checkout index repository
        uses: actions/checkout@v6
        with:
          repository: misaka10987/creeper-index
          path: ./.index/repo
          token: ${{ secrets.INDEX_AUTOMATION_TOKEN }}

      - name: Update index repository
        working-directory: ./.index
        run: cp -r ./index ./repo/

      - name: Commit and push to index
        working-directory: ./.index/repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ./index
          git diff --cached --quiet || git commit -m "auto update index"
          git push
